<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>社畜反击战</title>
  <style>
    :root {
      --ink: #111827;
      --cabinet: #4502ff;
      --panel: #fff7d8;
      --yellow: #ffda14;
      --pink: #ff4d8d;
      --cyan: #27d4ff;
      --green: #16a34a;
      --danger: #dc2626;
      --button: #f8fafc;
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: linear-gradient(180deg, #050816 0%, #14102c 54%, #090a12 100%);
      color: var(--ink);
      font-family: "Courier New", monospace;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
    }

    button { font: inherit; }

    .shell {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 0;
    }

    .cabinet {
      position: relative;
      width: min(100vw, 430px);
      height: 100dvh;
      overflow: hidden;
      background: #050816;
      border: 0;
      box-shadow: none;
      padding: 0;
    }

    .marquee {
      position: absolute;
      z-index: 3;
      top: max(8px, env(safe-area-inset-top));
      left: 8px;
      right: 8px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      padding: 8px 10px;
      color: #fff;
      background: var(--ink);
      border: 3px solid var(--cabinet);
      box-shadow: inset 0 -5px 0 rgba(255,255,255,.08);
    }

    .marquee h1 {
      margin: 0;
      font-size: clamp(22px, 7vw, 30px);
      line-height: .9;
      color: var(--yellow);
      text-shadow: 3px 3px 0 var(--pink);
      white-space: nowrap;
    }

    .badge {
      padding: 4px 7px;
      border: 2px solid #fff;
      color: #fff;
      background: var(--cabinet);
      font-size: 12px;
      white-space: nowrap;
    }

    .screen-wrap {
      position: absolute;
      inset: 0;
      border: 0;
      background: #050816;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #050816;
    }

    .touch-controls {
      position: absolute;
      z-index: 4;
      left: 8px;
      right: 8px;
      bottom: max(8px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      color: #fff;
      background: rgba(5, 8, 22, .86);
      border: 3px solid var(--cyan);
      padding: 10px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    .move-pad {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-rows: repeat(2, 54px);
      gap: 8px;
      min-width: 0;
    }

    .action-pad {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-rows: repeat(2, 54px);
      gap: 8px;
      min-width: 0;
    }

    .touch-btn {
      display: inline-grid;
      place-items: center;
      min-width: 0;
      min-height: 54px;
      padding: 0 4px;
      color: var(--ink);
      background: var(--button);
      border: 3px solid #fff;
      border-radius: 0;
      box-shadow: 0 5px 0 var(--cabinet);
      font-family: inherit;
      font-weight: 700;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .touch-btn:active,
    .touch-btn.is-pressed {
      transform: translateY(4px);
      box-shadow: 0 1px 0 var(--cabinet);
    }

    .touch-btn.move {
      background: var(--yellow);
    }

    .touch-btn.combo {
      background: var(--pink);
      color: #fff;
      text-shadow: 2px 2px 0 var(--ink);
    }

    .touch-btn.skill {
      background: var(--cyan);
    }

    .touch-btn.ultimate {
      background: var(--yellow);
      box-shadow: 0 5px 0 var(--pink);
    }

    .touch-btn.system {
      background: var(--green);
      color: #fff;
      text-shadow: 2px 2px 0 var(--ink);
    }

    .jump { grid-column: 2; grid-row: 1; }
    .left { grid-column: 1; grid-row: 2; }
    .duck { grid-column: 2; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }

    @media (max-height: 720px) {
      .touch-controls { padding: 8px; gap: 8px; }
      .touch-btn { min-height: 48px; font-size: 15px; }
      .move-pad,
      .action-pad { grid-template-rows: repeat(2, 48px); gap: 6px; }
    }

    @media (max-width: 760px) {
      .shell { align-items: center; }
      .cabinet {
        width: 100vw;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="cabinet" aria-label="社畜反击战游戏机">
      <div class="marquee">
        <h1>社畜反击战</h1>
        <div class="badge">Boss Rush · 5F</div>
      </div>

      <div class="screen-wrap">
        <canvas id="game" width="430" height="760" aria-label="社畜反击战游戏画面"></canvas>
      </div>

      <div class="touch-controls" aria-label="触屏操作区">
        <div class="move-pad" aria-label="移动操作">
          <button class="touch-btn move jump" type="button" data-press="space" aria-label="跳跃">跳</button>
          <button class="touch-btn move left" type="button" data-press="left" aria-label="向左移动">←</button>
          <button class="touch-btn move duck" type="button" data-press="s" aria-label="下蹲">蹲</button>
          <button class="touch-btn move right" type="button" data-press="right" aria-label="向右移动">→</button>
        </div>
        <div class="action-pad" aria-label="出招操作">
          <button class="touch-btn combo" type="button" data-press="1 j" aria-label="键盘连击">普攻</button>
          <button class="touch-btn skill" type="button" data-press="2 j" aria-label="需求反弹">反弹</button>
          <button class="touch-btn skill" type="button" data-press="3 j" aria-label="离职信突刺">突刺</button>
          <button class="touch-btn skill" type="button" data-press="k" aria-label="扔订书机">远程</button>
          <button class="touch-btn ultimate" type="button" data-press="l" aria-label="释放大招">大招</button>
          <button class="touch-btn system" type="button" data-press="enter" aria-label="开始暂停或重开">开始</button>
        </div>
      </div>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/input.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
